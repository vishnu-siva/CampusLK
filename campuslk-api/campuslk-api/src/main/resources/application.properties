# ===============================
# SERVER
# ===============================
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campuslk?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:campuslk_user}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expirationMinutes=${JWT_EXPIRATION_MINUTES:10080}
spring.jpa.open-in-view=false

# ===============================
# CORS
# ===============================
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

